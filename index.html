<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Audio Analyzer</title>
    <script type="importmap">
    {
      "imports": {
        "lucide": "https://esm.sh/lucide@0.447.0"
      }
    }
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            padding: 10px 0;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .visualizer-container {
            height: 120px;
            background: var(--card);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        #visualizer {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .record-btn:active {
            transform: scale(0.95);
        }

        .record-btn.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .results {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        #transcript-content {
            flex: 1;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .speaker-block {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--primary);
        }

        .speaker-label {
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speaker-1 { color: #60a5fa; }
        .speaker-2 { color: #f472b6; }
        .speaker-unknown { color: var(--text-muted); }

        .word-tag {
            display: inline-block;
            margin-right: 4px;
            position: relative;
        }

        .word-info {
            font-size: 10px;
            color: var(--text-muted);
            display: block;
            line-height: 1;
        }

        .status-bar {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            padding: 5px;
        }

        .live-transcript {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.4;
            color: var(--text-muted);
            padding: 20px;
            background: var(--card);
            border-radius: 12px;
            border: 1px dashed #334155;
            transition: all 0.3s ease;
            margin-bottom: 0;
        }

        .live-transcript.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
            font-weight: 500;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Voice Diarization</h1>
        </div>

        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
            <div id="pitch-display" style="position: absolute; top: 10px; right: 10px; font-family: monospace; font-size: 12px; color: var(--accent);">0 Hz</div>
        </div>

        <div id="live-transcript" class="live-transcript">
            Ready to transcribe...
        </div>

        <div class="controls">
            <button id="record-btn" class="record-btn">
                <i data-lucide="mic" id="mic-icon"></i>
            </button>
        </div>

        <div class="results">
            <div class="results-header">
                <span>Transcription & Analysis</span>
                <span id="analysis-badge" class="hidden">AI Analyzed</span>
            </div>
            <div id="transcript-content">
                <p style="color: var(--text-muted); text-align: center; margin-top: 20px;">
                    Press the microphone to start recording.
                </p>
            </div>
        </div>

        <div class="status-bar" id="status-text">Ready</div>
    </div>

    <script type="module" src="app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
